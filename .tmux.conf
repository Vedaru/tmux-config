# tmux config — WSL2, minimal
# Prefix: Ctrl-a

# --- Prefix ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- Pane navigation (prefix + hjkl) ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Windows ---
bind c       new-window -c '#{pane_current_path}'
bind ,       command-prompt -I '#W' 'rename-window %%'
bind &       confirm-before -p "kill-window #W? (y/n)" kill-window

# --- Splits ---
bind '|'  split-window -h -c '#{pane_current_path}'
bind -    split-window -v -c '#{pane_current_path}'
bind x    confirm-before -p "kill-pane #P? (y/n)" kill-pane
unbind C-x

# --- Resize panes ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Zoom ---
bind z resize-pane -Z

# --- Session management ---
bind d   detach-client
bind s   choose-tree -Zs

# --- Reload config ---
bind r source-file ~/.tmux.conf \; display 'Config reloaded!'
# Force redraw all clients (fix nvim shift after pane kill)
bind R refresh-client -S

# --- Copy mode: vi keys ---
setw -g mode-keys vi
bind -T copy-mode-vi v   send-keys -X begin-selection
bind -T copy-mode-vi V   send-keys -X select-line
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y   send-keys -X copy-selection-and-cancel

# --- Paste ---
bind p paste-buffer

# --- Settings ---
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g default-terminal 'screen-256color'
# set -g default-terminal 'tmux-256color'
set -ga terminal-overrides ',*256color*:Tc'
# Fix ConPTY scroll-region bug (status bar ghosting in Windows Terminal)
set -ga terminal-overrides ',*:Csr=\E[%i%p1%d;%p2%dr:'
# Disable back-color-erase — ConPTY's BCE leaks status bar bg into pane above
set -ga terminal-overrides ',*:ut@:'
set -g history-limit 50000
set -sg escape-time 0
set -g focus-events on

# Fix pane resize glitches when killing windows/panes with nvim open
# Use manual sizing — lets nvim properly receive SIGWINCH on resize
# set -g window-size manual  # segfaults tmux 3.4
setw -g aggressive-resize on
# Keep dead panes briefly so nvim can cleanly exit alternate screen
set -g remain-on-exit on
set -g remain-on-exit-format 'Pane dead: #{pane_title}'
# Force redraw all clients after killing a pane/window
set-hook -g after-kill-pane 'refresh-client -S 2>/dev/null'
set-hook -g window-unlinked 'refresh-client -S 2>/dev/null'  # was after-kill-window (removed in 3.4)
set-hook -g pane-exited 'refresh-client -S 2>/dev/null'
# Fix directional shift when switching windows
set-hook -g after-select-window 'refresh-client -S 2>/dev/null'

# Bell — silence completely
set -g bell-action none
set -g visual-bell off
set -g monitor-bell off

# Status bar — minimal (color matches nvim banner: #c2a86b)
set -g status on
set -g status-style 'bg=#0a0a0a,fg=#c2a86b'
set -g status-left '#[fg=#c2a86b]#S '
set -g status-right '#[fg=#c2a86b]%H:%M'
set -g window-status-current-format '#[fg=#c2a86b,bold]#I:#W'
set -g window-status-format '#[fg=#555555]#I:#W'
# Command/message popup styling — prevents rendering ghosts on nvim
set -g message-style 'bg=#1a1a1a,fg=#c2a86b'
set -g message-command-style 'bg=#1a1a1a,fg=#c2a86b'

# Disable automatic window renaming
set -g automatic-rename off

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-capture-pane-contents 'off'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

run '~/.tmux/plugins/tpm/tpm'
